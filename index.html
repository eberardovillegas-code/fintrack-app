<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAQLUB | Sistema de Gestión 2026</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    borderRadius: { '3xl': '1.5rem', '4xl': '2rem' }
                }
            }
        }
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .animate-pulse-red { animation: pulse-red 1.5s infinite; }

        /* Filter pill active states */
        .filter-pill-all.active   { background: #1e293b; color: #fff; }
        .filter-pill-all.active.dark-mode { background: #e2e8f0; color: #0f172a; }
        .filter-pill-A.active  { background: #ef4444; color: #fff; }
        .filter-pill-B.active  { background: #eab308; color: #fff; }
        .filter-pill-C.active  { background: #22c55e; color: #fff; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300 antialiased">
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Credenciales oficiales MAQLUB
        const firebaseConfig = {
            apiKey: "AIzaSyA5l_egxukJZ4kQKXQD5NiQI0Y7qUY9UFI",
            authDomain: "programaactividades-maqlub.firebaseapp.com",
            projectId: "programaactividades-maqlub",
            storageBucket: "programaactividades-maqlub.firebasestorage.app",
            messagingSenderId: "694377611840",
            appId: "1:694377611840:web:8ff68af9851eff3f23d5a5",
            measurementId: "G-BPKGYD8K24"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);

            window.MAQLUB_DB = db;
            window.MAQLUB_AUTH = auth;
            window.MAQLUB_METHODS = { collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, query, signInAnonymously, onAuthStateChanged };
            window.FIREBASE_READY = true;
        } catch (e) {
            console.error("Error Firebase:", e);
            window.FIREBASE_READY = false;
        }
    </script>

    <!-- Lógica de la Aplicación -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, Fragment } = React;

        // Íconos SVG Manuales (Garantiza funcionamiento en GitHub Pages)
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Plus: <path d="M5 12h14M12 5v14" />,
                Layout: <Fragment><rect width="18" height="18" x="3" y="3" rx="2" /><path d="M3 9h18M9 21V9" /></Fragment>,
                List: <path d="M3 12h.01M3 18h.01M3 6h.01M8 12h13M8 18h13M8 6h13" />,
                Search: <Fragment><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></Fragment>,
                Calendar: <Fragment><rect width="18" height="18" x="3" y="4" rx="2" ry="2" /><path d="M16 2v4M8 2v4M3 10h18" /></Fragment>,
                AlertCircle: <Fragment><circle cx="12" cy="12" r="10" /><line x1="12" x2="12" y1="8" y2="12" /><line x1="12" x2="12.01" y1="16" y2="16" /></Fragment>,
                CheckCircle2: <Fragment><circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" /></Fragment>,
                Clock: <Fragment><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></Fragment>,
                Trash2: <Fragment><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><line x1="10" x2="10" y1="11" y2="17" /><line x1="14" x2="14" y1="11" y2="17" /></Fragment>,
                Edit2: <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" />,
                X: <Fragment><path d="M18 6 6 18" /><path d="M6 6l12 12" /></Fragment>,
                FileText: <Fragment><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /><line x1="16" x2="8" y1="13" y2="13" /><line x1="16" x2="8" y1="17" y2="17" /><line x1="10" x2="8" y1="9" y2="9" /></Fragment>,
                Loader2: <path d="M21 12a9 9 0 1 1-6.219-8.56" />,
                Download: <Fragment><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" x2="12" y1="15" y2="3" /></Fragment>,
                Printer: <Fragment><polyline points="6 9 6 2 18 2 18 9" /><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" /><rect width="12" height="8" x="6" y="14" /></Fragment>,
                FileSpreadsheet: <Fragment><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /><path d="M8 13h2v2H8zM12 13h2v2h-2zM8 17h2v2H8zM12 17h2v2h-2z" /></Fragment>,
                ChevronDown: <path d="m6 9 6 6 6-6" />,
                Sun: <Fragment><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" /></Fragment>,
                Moon: <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />,
                AlertTriangle: <Fragment><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" /><line x1="12" x2="12" y1="9" y2="13" /><line x1="12" x2="12.01" y1="17" y2="17" /></Fragment>,
                Bell: <Fragment><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" /><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" /></Fragment>,
                Share2: <Fragment><circle cx="18" cy="5" r="3" /><circle cx="6" cy="12" r="3" /><circle cx="18" cy="19" r="3" /><line x1="8.59" x2="15.42" y1="13.51" y2="17.49" /><line x1="15.41" x2="8.59" y1="6.51" y2="10.49" /></Fragment>,
                Filter: <Fragment><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" /></Fragment>,
                SortDesc: <Fragment><path d="M11 5h4M11 9h7M11 13h10"/><path d="M9 17L6 20l-3-3"/><path d="M6 4v16"/></Fragment>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        const PRIORITY_CONFIG = {
            A: { label: 'Alta', color: 'bg-red-500' },
            B: { label: 'Media', color: 'bg-yellow-400' },
            C: { label: 'Baja', color: 'bg-green-500' }
        };

        const STATUS_CONFIG = {
            PENDIENTE: { label: 'Pendiente', icon: 'Clock', color: 'text-orange-500' },
            CONTINUO: { label: 'Continuo', icon: 'AlertCircle', color: 'text-blue-500' },
            CONCLUIDO: { label: 'Concluido', icon: 'CheckCircle2', color: 'text-emerald-500' }
        };

        // Orden de prioridad para sorting
        const PRIORITY_ORDER = { A: 0, B: 1, C: 2 };

        const getTaskAlertStatus = (task) => {
            if (task.status === 'CONCLUIDO' || !task.end) return { type: 'NONE', daysLeft: null };
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const endDate = new Date(task.end + 'T00:00:00');
            const diffTime = endDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const alertThreshold = parseInt(task.alertDays) || 7;
            if (diffDays < 0) return { type: 'VENCIDO', daysLeft: diffDays };
            if (diffDays <= alertThreshold) return { type: 'PROXIMO', daysLeft: diffDays };
            return { type: 'NORMAL', daysLeft: diffDays };
        };

        // ─── Componente de Filtros de Prioridad ───────────────────────────────────
        function PriorityFilter({ activePriority, onChange, taskCounts }) {
            const filters = [
                { key: 'ALL', label: 'Todas', count: taskCounts.ALL,
                  base: 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300',
                  active: 'bg-slate-800 dark:bg-slate-100 text-white dark:text-slate-900' },
                { key: 'A', label: 'Nivel A', count: taskCounts.A,
                  base: 'bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400',
                  active: 'bg-red-500 text-white' },
                { key: 'B', label: 'Nivel B', count: taskCounts.B,
                  base: 'bg-yellow-50 dark:bg-yellow-900/20 text-yellow-600 dark:text-yellow-400',
                  active: 'bg-yellow-400 text-white' },
                { key: 'C', label: 'Nivel C', count: taskCounts.C,
                  base: 'bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400',
                  active: 'bg-green-500 text-white' },
            ];

            return (
                <div className="flex items-center gap-2 flex-wrap">
                    <div className="flex items-center gap-1.5 text-[9px] font-black uppercase tracking-widest text-slate-400 mr-1">
                        <Icon name="Filter" size={13} />
                        <span>Prioridad</span>
                    </div>
                    {filters.map(f => (
                        <button
                            key={f.key}
                            onClick={() => onChange(f.key)}
                            className={`flex items-center gap-2 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all duration-200 hover:scale-105 active:scale-95 ${activePriority === f.key ? f.active + ' shadow-md' : f.base}`}
                        >
                            {f.key !== 'ALL' && (
                                <span className={`w-2 h-2 rounded-full inline-block ${
                                    f.key === 'A' ? (activePriority === 'A' ? 'bg-white' : 'bg-red-500') :
                                    f.key === 'B' ? (activePriority === 'B' ? 'bg-white' : 'bg-yellow-400') :
                                    (activePriority === 'C' ? 'bg-white' : 'bg-green-500')
                                }`}></span>
                            )}
                            {f.label}
                            <span className={`px-1.5 py-0.5 rounded-md text-[9px] font-black ${
                                activePriority === f.key
                                    ? 'bg-white/30 text-inherit'
                                    : 'bg-slate-200/70 dark:bg-slate-700 text-slate-500 dark:text-slate-400'
                            }`}>{f.count}</span>
                        </button>
                    ))}
                </div>
            );
        }

        // ─── Componente Indicador de Orden ────────────────────────────────────────
        function SortIndicator({ activePriority }) {
            if (activePriority !== 'ALL') return null;
            return (
                <div className="flex items-center gap-1.5 text-[9px] font-black uppercase tracking-widest text-slate-400 ml-auto">
                    <Icon name="SortDesc" size={13} />
                    <span>Orden A → B → C</span>
                </div>
            );
        }

        function App() {
            const [tasks, setTasks] = useState([]);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('board');
            const [searchTerm, setSearchTerm] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingTask, setEditingTask] = useState(null);
            const [showExportMenu, setShowExportMenu] = useState(false);
            const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('maqlub-theme-v5') === 'dark');
            // ── NUEVO estado de filtro de prioridad ──
            const [priorityFilter, setPriorityFilter] = useState('ALL');
            const [formData, setFormData] = useState({ title: '', start: '', end: '', priority: 'B', status: 'PENDIENTE', comments: '', alertDays: 7 });

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                localStorage.setItem('maqlub-theme-v5', isDarkMode ? 'dark' : 'light');
            }, [isDarkMode]);

            useEffect(() => {
                const checkFirebase = setInterval(async () => {
                    const { MAQLUB_DB: db, MAQLUB_AUTH: auth, MAQLUB_METHODS: m } = window;
                    if (db && auth && m) {
                        clearInterval(checkFirebase);
                        m.signInAnonymously(auth).catch(console.error);
                        m.onAuthStateChanged(auth, (u) => {
                            if (u) {
                                m.onSnapshot(m.query(m.collection(db, "tasks")), (snapshot) => {
                                    setTasks(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                                    setLoading(false);
                                });
                            }
                        });
                    }
                }, 500);
                return () => clearInterval(checkFirebase);
            }, []);

            const stats = useMemo(() => ({
                total: tasks.length,
                concluido: tasks.filter(t => t.status === 'CONCLUIDO').length,
                vencidos: tasks.filter(t => getTaskAlertStatus(t).type === 'VENCIDO').length,
                proximos: tasks.filter(t => getTaskAlertStatus(t).type === 'PROXIMO').length,
            }), [tasks]);

            // ── Conteos por prioridad (sobre todas las tareas, sin filtro de búsqueda) ──
            const taskCounts = useMemo(() => ({
                ALL: tasks.length,
                A: tasks.filter(t => t.priority === 'A').length,
                B: tasks.filter(t => t.priority === 'B').length,
                C: tasks.filter(t => t.priority === 'C').length,
            }), [tasks]);

            // ── Pipeline de filtrado y ordenamiento ──────────────────────────────
            const filteredTasks = useMemo(() => {
                let result = tasks;

                // 1. Filtro de búsqueda
                if (searchTerm) {
                    result = result.filter(t =>
                        t.title?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        (t.comments && t.comments.toLowerCase().includes(searchTerm.toLowerCase()))
                    );
                }

                // 2. Filtro de prioridad
                if (priorityFilter !== 'ALL') {
                    result = result.filter(t => t.priority === priorityFilter);
                }

                // 3. Ordenar siempre: A primero, luego B, luego C (y dentro de cada nivel por fecha)
                result = [...result].sort((a, b) => {
                    const pa = PRIORITY_ORDER[a.priority] ?? 99;
                    const pb = PRIORITY_ORDER[b.priority] ?? 99;
                    if (pa !== pb) return pa - pb;
                    // Desempate por fecha de término
                    if (a.end && b.end) return a.end.localeCompare(b.end);
                    return 0;
                });

                return result;
            }, [tasks, searchTerm, priorityFilter]);

            const handleSave = async (e) => {
                e.preventDefault();
                const { MAQLUB_DB: db, MAQLUB_METHODS: m } = window;
                try {
                    if (editingTask) await m.updateDoc(m.doc(db, "tasks", editingTask.id), formData);
                    else await m.addDoc(m.collection(db, "tasks"), { ...formData, createdAt: new Date().toISOString() });
                    setIsModalOpen(false);
                } catch (e) { alert("Error al guardar en Cloud."); }
            };

            const handleDelete = async (id) => {
                if (!confirm("¿Eliminar permanentemente?")) return;
                const { MAQLUB_DB: db, MAQLUB_METHODS: m } = window;
                await m.deleteDoc(m.doc(db, "tasks", id));
            };

            const moveStatus = async (id, newStatus) => {
                const { MAQLUB_DB: db, MAQLUB_METHODS: m } = window;
                await m.updateDoc(m.doc(db, "tasks", id), { status: newStatus });
            };

            const exportCSV = () => {
                const headers = ["Actividad", "Inicio", "Fin", "Prioridad", "Estatus"];
                const rows = tasks.map(t => [`"${t.title}"`, t.start, t.end, t.priority, t.status]);
                const csv = [headers, ...rows].map(e => e.join(",")).join("\n");
                const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `MAQLUB_Reporte_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
                setShowExportMenu(false);
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white dark:bg-slate-950">
                    <Icon name="Loader2" size={50} className="animate-spin text-blue-600 mb-4"/>
                    <p className="font-black text-slate-400 uppercase tracking-widest text-xs">Conectando a MAQLUB Cloud...</p>
                </div>
            );

            return (
                <div className="min-h-screen text-slate-900 dark:text-slate-100 flex flex-col">
                    <header className="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-30 px-4 py-4 shadow-sm">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <div className="p-2.5 bg-blue-600 rounded-2xl text-white shadow-xl shadow-blue-500/20"><Icon name="FileText" size={24}/></div>
                                <div>
                                    <h1 className="text-xl font-black uppercase italic tracking-tighter">MAQLUB CLOUD 2026</h1>
                                    <p className="text-[10px] font-bold opacity-40 uppercase tracking-[0.2em]">Ing. Eberardo Villegas</p>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-2">
                                <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-3 rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-yellow-400 transition-all hover:scale-105">
                                    {isDarkMode ? <Icon name="Sun" /> : <Icon name="Moon" />}
                                </button>
                                
                                <div className="relative">
                                    <Icon name="Search" size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input type="text" placeholder="Buscar..." className="pl-10 pr-4 py-3 rounded-2xl bg-slate-100 dark:bg-slate-800 border-none outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm w-48" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                </div>

                                <div className="relative">
                                    <button onClick={() => setShowExportMenu(!showExportMenu)} className="p-3 border-2 border-slate-100 dark:border-slate-800 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-all"><Icon name="Share2" /></button>
                                    {showExportMenu && (
                                        <div className="absolute right-0 mt-3 w-52 bg-white dark:bg-slate-900 shadow-2xl rounded-3xl p-2 z-40 border border-slate-100 dark:border-slate-800 animate-in fade-in zoom-in duration-200">
                                            <button onClick={exportCSV} className="w-full text-left p-4 text-[10px] font-black uppercase tracking-widest hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded-2xl transition-all">Exportar Excel</button>
                                            <button onClick={() => { setShowExportMenu(false); window.print(); }} className="w-full text-left p-4 text-[10px] font-black uppercase tracking-widest hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded-2xl transition-all">Imprimir Reporte PDF</button>
                                        </div>
                                    )}
                                </div>

                                <button onClick={() => { setEditingTask(null); setFormData({title:'',start:'',end:'',priority:'B',status:'PENDIENTE',comments:'',alertDays:7}); setIsModalOpen(true); }} className="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl shadow-blue-500/40 hover:bg-blue-700 active:scale-95 transition-all">
                                    Nuevo
                                </button>
                            </div>
                        </div>

                        <div className="max-w-7xl mx-auto flex gap-3 overflow-x-auto no-scrollbar mt-6 pt-4 border-t border-slate-100 dark:border-slate-800">
                            <StatBox label="Total" value={stats.total} />
                            <StatBox label="Vencidos" value={stats.vencidos} color="bg-red-600 text-white animate-pulse" icon="AlertTriangle" />
                            <StatBox label="Alertas" value={stats.proximos} color="bg-orange-500 text-white" icon="Bell" />
                            <StatBox label="Hecho" value={stats.concluido} color="bg-emerald-600 text-white" />
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8 w-full flex-grow">
                        {/* ── Barra de controles: filtros + toggle de vista ── */}
                        <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-8">
                            {/* Filtros de prioridad */}
                            <div className="flex flex-col gap-2 w-full sm:w-auto">
                                <PriorityFilter
                                    activePriority={priorityFilter}
                                    onChange={setPriorityFilter}
                                    taskCounts={taskCounts}
                                />
                                {/* Indicador de resultados cuando hay filtro activo */}
                                {priorityFilter !== 'ALL' && (
                                    <p className="text-[9px] font-black uppercase tracking-widest text-slate-400 pl-1">
                                        Mostrando {filteredTasks.length} de {tasks.length} actividades
                                        {searchTerm ? ` · búsqueda: "${searchTerm}"` : ''}
                                    </p>
                                )}
                            </div>

                            {/* Toggle vista */}
                            <div className="flex items-center gap-3 shrink-0">
                                <SortIndicator activePriority={priorityFilter} />
                                <div className="flex bg-slate-200 dark:bg-slate-900 p-1 rounded-2xl">
                                    <button onClick={() => setView('board')} className={`px-6 py-2.5 rounded-xl text-[10px] font-black transition-all ${view === 'board' ? 'bg-white dark:bg-slate-700 dark:text-blue-400 shadow-md' : 'text-slate-500'}`}>TABLERO</button>
                                    <button onClick={() => setView('list')} className={`px-6 py-2.5 rounded-xl text-[10px] font-black transition-all ${view === 'list' ? 'bg-white dark:bg-slate-700 dark:text-blue-400 shadow-md' : 'text-slate-500'}`}>LISTA</button>
                                </div>
                            </div>
                        </div>

                        {/* ── Vista Tablero Kanban ── */}
                        {view === 'board' ? (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 pb-20">
                                <KanbanCol status="PENDIENTE" tasks={filteredTasks} onEdit={t => {setEditingTask(t); setFormData(t); setIsModalOpen(true);}} onDelete={handleDelete} onMove={moveStatus} />
                                <KanbanCol status="CONTINUO"  tasks={filteredTasks} onEdit={t => {setEditingTask(t); setFormData(t); setIsModalOpen(true);}} onDelete={handleDelete} onMove={moveStatus} />
                                <KanbanCol status="CONCLUIDO" tasks={filteredTasks} onEdit={t => {setEditingTask(t); setFormData(t); setIsModalOpen(true);}} onDelete={handleDelete} onMove={moveStatus} />
                            </div>
                        ) : (
                            /* ── Vista Lista con separadores de prioridad ── */
                            <div className="bg-white dark:bg-slate-900 rounded-[2.5rem] overflow-hidden border border-slate-200 dark:border-slate-800 shadow-2xl mb-20">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-slate-50 dark:bg-slate-800 text-[10px] font-black uppercase tracking-[0.2em] text-slate-500">
                                            <tr>
                                                <th className="p-6">Actividad</th>
                                                <th className="p-6">Prioridad</th>
                                                <th className="p-6">Estado</th>
                                                <th className="p-6">Inicio / Fin</th>
                                                <th className="p-6 text-right">Acciones</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 dark:divide-slate-800">
                                            {filteredTasks.length === 0 ? (
                                                <tr>
                                                    <td colSpan={5} className="p-16 text-center text-slate-400">
                                                        <div className="flex flex-col items-center gap-3">
                                                            <Icon name="Filter" size={32} className="opacity-30" />
                                                            <p className="text-[11px] font-black uppercase tracking-widest opacity-50">Sin actividades con este filtro</p>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ) : (
                                                (() => {
                                                    // Insertar separadores de prioridad en vista lista
                                                    const rows = [];
                                                    let lastPriority = null;
                                                    filteredTasks.forEach(t => {
                                                        if (t.priority !== lastPriority) {
                                                            lastPriority = t.priority;
                                                            const cfg = PRIORITY_CONFIG[t.priority];
                                                            rows.push(
                                                                <tr key={`sep-${t.priority}`} className="select-none">
                                                                    <td colSpan={5} className="px-6 py-2 bg-slate-50 dark:bg-slate-800/60">
                                                                        <div className="flex items-center gap-2">
                                                                            <span className={`w-2.5 h-2.5 rounded-full ${cfg.color} inline-block`}></span>
                                                                            <span className="text-[9px] font-black uppercase tracking-[0.25em] text-slate-400">
                                                                                Nivel {t.priority} — Prioridad {cfg.label}
                                                                            </span>
                                                                        </div>
                                                                    </td>
                                                                </tr>
                                                            );
                                                        }
                                                        rows.push(
                                                            <tr key={t.id} className="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors cursor-pointer" onClick={() => {setEditingTask(t); setFormData(t); setIsModalOpen(true);}}>
                                                                <td className="p-6">
                                                                    <div className="font-bold text-sm">{t.title}</div>
                                                                    <div className="text-[10px] opacity-40 italic mt-1">{t.comments}</div>
                                                                </td>
                                                                <td className="p-6">
                                                                    <span className={`px-2 py-1 rounded-lg text-[9px] font-black text-white ${PRIORITY_CONFIG[t.priority].color}`}>NIVEL {t.priority}</span>
                                                                </td>
                                                                <td className="p-6">
                                                                    <span className={`text-[11px] font-bold ${STATUS_CONFIG[t.status].color}`}>{STATUS_CONFIG[t.status].label}</span>
                                                                </td>
                                                                <td className="p-6 text-xs opacity-60">
                                                                    <div className="font-bold">{t.start}</div>
                                                                    <div className="text-[10px] text-blue-500">{t.end}</div>
                                                                </td>
                                                                <td className="p-6 text-right" onClick={e => e.stopPropagation()}>
                                                                    <button onClick={() => {setEditingTask(t); setFormData(t); setIsModalOpen(true);}} className="p-2 text-slate-300 hover:text-blue-600 transition-all"><Icon name="Edit2" size={16}/></button>
                                                                    <button onClick={() => handleDelete(t.id)} className="p-2 text-slate-300 hover:text-red-600 transition-all"><Icon name="Trash2" size={16}/></button>
                                                                </td>
                                                            </tr>
                                                        );
                                                    });
                                                    return rows;
                                                })()
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md overflow-y-auto">
                            <div className="bg-white dark:bg-slate-900 rounded-[3rem] w-full max-w-lg shadow-2xl border border-white/10 animate-in fade-in zoom-in duration-300 flex flex-col max-h-[90vh]">
                                <div className="p-8 border-b dark:border-slate-800 flex justify-between items-center shrink-0">
                                    <div className="flex items-center gap-3"><div className="w-2 h-8 bg-blue-600 rounded-full"></div><h2 className="text-2xl font-black uppercase tracking-tighter dark:text-white">{editingTask ? 'Editar' : 'Nueva'} Actividad</h2></div>
                                    <button onClick={() => setIsModalOpen(false)} className="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-all"><Icon name="X" size={24}/></button>
                                </div>
                                
                                <form onSubmit={handleSave} className="p-8 space-y-6 overflow-y-auto flex-grow custom-scrollbar">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase tracking-widest opacity-40">Nombre de la Actividad</label>
                                        <input required className="w-full p-5 rounded-2xl border-2 border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800 dark:text-white font-bold outline-none focus:border-blue-500 transition-all" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase tracking-widest opacity-40">Fecha de Inicio</label>
                                            <input type="date" className="w-full p-4 rounded-xl border-2 border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800 dark:text-white font-bold" value={formData.start} onChange={e => setFormData({...formData, start: e.target.value})} />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase tracking-widest opacity-40">Fecha de Término</label>
                                            <input type="date" required className="w-full p-4 rounded-xl border-2 border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800 dark:text-white font-bold" value={formData.end} onChange={e => setFormData({...formData, end: e.target.value})} />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase tracking-widest opacity-40">Días para Alerta</label>
                                            <input type="number" min="0" className="w-full p-4 rounded-xl border-2 border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800 dark:text-white font-bold" value={formData.alertDays} onChange={e => setFormData({...formData, alertDays: e.target.value})} />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase tracking-widest opacity-40">Prioridad</label>
                                            <select className="w-full p-4 rounded-xl border-2 border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800 dark:text-white font-bold" value={formData.priority} onChange={e => setFormData({...formData, priority: e.target.value})}><option value="A">Nivel A (Alta)</option><option value="B">Nivel B (Media)</option><option value="C">Nivel C (Baja)</option></select>
                                        </div>
                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase tracking-widest opacity-40">Estatus Operativo</label>
                                        <select className="w-full p-4 rounded-xl border-2 border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800 dark:text-white font-bold" value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})}><option value="PENDIENTE">Pendiente</option><option value="CONTINUO">Continuo</option><option value="CONCLUIDO">Concluido</option></select>
                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase tracking-widest opacity-40">Notas</label>
                                        <textarea rows="3" className="w-full p-5 rounded-3xl border-2 border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800 dark:text-white italic outline-none focus:border-blue-500" value={formData.comments} onChange={e => setFormData({...formData, comments: e.target.value})}></textarea>
                                    </div>
                                    
                                    <div className="flex gap-4 pt-4 pb-2">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 py-4 font-black uppercase tracking-widest text-xs opacity-50 hover:opacity-100 dark:text-white transition-all">Cancelar</button>
                                        <button type="submit" className="flex-[2] py-4 bg-blue-600 text-white font-black uppercase tracking-widest text-xs rounded-2xl shadow-xl shadow-blue-500/40 hover:bg-blue-700 transform hover:-translate-y-1 transition-all">
                                            {editingTask ? 'Guardar Cambios' : 'Crear Actividad'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function StatBox({ label, value, color = "bg-slate-100 dark:bg-slate-800", icon }) {
            return (
                <div className={`px-6 py-4 rounded-2xl flex items-center gap-4 min-w-[160px] shadow-sm transition-all hover:scale-105 cursor-default ${color}`}>
                    {icon && <Icon name={icon} size={18} className="opacity-50" />}
                    <div><div className="text-[9px] font-black uppercase tracking-widest opacity-50">{label}</div><div className="text-xl font-black">{value}</div></div>
                </div>
            );
        }

        function KanbanCol({ status, tasks, onEdit, onDelete, onMove }) {
            const colTasks = tasks.filter(t => t.status === status);
            const config = STATUS_CONFIG[status];
            return (
                <div className="flex flex-col gap-6">
                    <div className="flex justify-between items-center p-5 rounded-2xl bg-white dark:bg-slate-900 border-2 dark:border-slate-800 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className={`p-2 rounded-lg ${config.color} bg-opacity-10`}><Icon name={config.icon} size={18}/></div>
                            <h3 className="font-black text-[11px] uppercase tracking-widest dark:text-slate-300">{config.label}</h3>
                        </div>
                        <span className="text-[10px] font-black opacity-30 px-2 py-1 bg-slate-50 dark:bg-slate-800 rounded-lg">{colTasks.length}</span>
                    </div>
                    <div className="flex flex-col gap-4 min-h-[500px]">
                        {colTasks.length === 0 ? (
                            <div className="flex flex-col items-center justify-center h-32 opacity-20 gap-2">
                                <Icon name="Filter" size={22} />
                                <p className="text-[9px] font-black uppercase tracking-widest">Sin resultados</p>
                            </div>
                        ) : colTasks.map(t => {
                            const alert = getTaskAlertStatus(t);
                            return (
                                <div key={t.id} onClick={() => onEdit(t)} className={`p-6 rounded-[2.5rem] border-2 shadow-sm transition-all group bg-white dark:bg-slate-900 hover:shadow-2xl hover:-translate-y-1 border-white dark:border-slate-800 hover:border-blue-500/20 dark:hover:border-blue-500/40 cursor-pointer ${alert.type === 'VENCIDO' ? 'ring-2 ring-red-600 border-red-600' : ''}`}>
                                    <div className="flex justify-between mb-4">
                                        <span className={`px-2.5 py-1 rounded-md text-[9px] font-black text-white ${PRIORITY_CONFIG[t.priority].color}`}>NIVEL {t.priority}</span>
                                        <button onClick={e=>{e.stopPropagation(); onDelete(t.id);}} className="opacity-0 group-hover:opacity-100 p-2 rounded-xl text-slate-300 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-all"><Icon name="Trash2" size={14}/></button>
                                    </div>
                                    <div className="flex gap-3 items-start mb-5">
                                        {alert.type==='VENCIDO'&&<Icon name="AlertTriangle" size={20} className="text-red-600 animate-pulse-red shrink-0"/>}
                                        {alert.type==='PROXIMO'&&<Icon name="Bell" size={20} className="text-orange-500 shrink-0"/>}
                                        <h4 className="font-black text-sm uppercase leading-tight dark:text-white line-clamp-3">{t.title}</h4>
                                    </div>
                                    <div className="flex justify-between items-end pt-5 border-t border-slate-50 dark:border-slate-800">
                                        <div className="flex flex-col">
                                            <div className="text-[10px] font-black opacity-30 uppercase tracking-wider line-through decoration-blue-500/30 decoration-2">{t.start}</div>
                                            <div className="text-[10px] font-black text-blue-500 uppercase tracking-wider">{t.end || 'Pendiente'}</div>
                                            {alert.daysLeft!==null && (
                                                <div className={`text-[9px] font-black mt-1 uppercase tracking-tighter ${alert.type==='VENCIDO'?'text-red-600':'text-orange-500'}`}>
                                                    {alert.type==='VENCIDO'?`¡RETRASO: ${Math.abs(alert.daysLeft)} DÍAS!`:`Aviso en ${alert.daysLeft} d`}
                                                </div>
                                            )}
                                        </div>
                                        <div className="flex gap-1" onClick={e=>e.stopPropagation()}>
                                            {status!=='PENDIENTE'&&<button onClick={()=>onMove(t.id,'PENDIENTE')} className="p-2.5 hover:bg-orange-100 text-orange-400 rounded-xl transition-all"><Icon name="Clock" size={16}/></button>}
                                            {status!=='CONTINUO'&&<button onClick={()=>onMove(t.id,'CONTINUO')} className="p-2.5 hover:bg-blue-100 text-blue-400 rounded-xl transition-all"><Icon name="AlertCircle" size={16}/></button>}
                                            {status!=='CONCLUIDO'&&<button onClick={()=>onMove(t.id,'CONCLUIDO')} className="p-2.5 hover:bg-emerald-100 text-emerald-400 rounded-xl transition-all"><Icon name="CheckCircle2" size={16}/></button>}
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
